<!-- Text Animations -->
<!-- CSS + JavaScript for text effects -->

<style>
/* ============================================= */
/* TYPEWRITER EFFECT                             */
/* ============================================= */

.typewriter {
  overflow: hidden;
  border-right: 2px solid #4F46E5;
  white-space: nowrap;
  animation:
    typing 3s steps(30) 1s forwards,
    blink 0.7s step-end infinite;
  width: 0;
}

@keyframes typing {
  from { width: 0; }
  to { width: 100%; }
}

@keyframes blink {
  50% { border-color: transparent; }
}

/* Typewriter container */
.typewriter-container {
  display: inline-block;
}

/* ============================================= */
/* GRADIENT TEXT                                 */
/* ============================================= */

.text-gradient {
  background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 50%, #EC4899 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.text-gradient-animate {
  background: linear-gradient(90deg, #4F46E5, #7C3AED, #EC4899, #4F46E5);
  background-size: 300% 100%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gradient-flow 3s ease infinite;
}

@keyframes gradient-flow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ============================================= */
/* TEXT REVEAL                                   */
/* ============================================= */

.text-reveal {
  position: relative;
  display: inline-block;
  overflow: hidden;
}

.text-reveal span {
  display: inline-block;
  transform: translateY(100%);
  animation: text-reveal 0.6s ease forwards;
}

@keyframes text-reveal {
  to { transform: translateY(0); }
}

/* Staggered reveal */
.text-reveal-stagger span {
  display: inline-block;
  opacity: 0;
  transform: translateY(20px);
  animation: text-reveal-fade 0.4s ease forwards;
}

@keyframes text-reveal-fade {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ============================================= */
/* GLITCH EFFECT                                 */
/* ============================================= */

.text-glitch {
  position: relative;
  display: inline-block;
}

.text-glitch::before,
.text-glitch::after {
  content: attr(data-text);
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

.text-glitch::before {
  left: 2px;
  text-shadow: -2px 0 #ff00ff;
  clip: rect(24px, 550px, 90px, 0);
  animation: glitch-1 2s infinite linear alternate-reverse;
}

.text-glitch::after {
  left: -2px;
  text-shadow: -2px 0 #00ffff;
  clip: rect(85px, 550px, 140px, 0);
  animation: glitch-2 2s infinite linear alternate-reverse;
}

@keyframes glitch-1 {
  0% { clip: rect(132px, 9999px, 100px, 0); }
  5% { clip: rect(17px, 9999px, 94px, 0); }
  10% { clip: rect(40px, 9999px, 66px, 0); }
  15% { clip: rect(87px, 9999px, 82px, 0); }
  20% { clip: rect(137px, 9999px, 61px, 0); }
  25% { clip: rect(34px, 9999px, 14px, 0); }
  30% { clip: rect(133px, 9999px, 74px, 0); }
  35% { clip: rect(76px, 9999px, 107px, 0); }
  40% { clip: rect(59px, 9999px, 130px, 0); }
  45% { clip: rect(29px, 9999px, 84px, 0); }
  50% { clip: rect(22px, 9999px, 67px, 0); }
  55% { clip: rect(67px, 9999px, 62px, 0); }
  60% { clip: rect(10px, 9999px, 105px, 0); }
  65% { clip: rect(78px, 9999px, 115px, 0); }
  70% { clip: rect(105px, 9999px, 13px, 0); }
  75% { clip: rect(15px, 9999px, 75px, 0); }
  80% { clip: rect(66px, 9999px, 39px, 0); }
  85% { clip: rect(133px, 9999px, 73px, 0); }
  90% { clip: rect(36px, 9999px, 128px, 0); }
  95% { clip: rect(68px, 9999px, 103px, 0); }
  100% { clip: rect(14px, 9999px, 100px, 0); }
}

@keyframes glitch-2 {
  0% { clip: rect(129px, 9999px, 36px, 0); }
  5% { clip: rect(36px, 9999px, 4px, 0); }
  10% { clip: rect(85px, 9999px, 66px, 0); }
  15% { clip: rect(91px, 9999px, 91px, 0); }
  20% { clip: rect(148px, 9999px, 138px, 0); }
  25% { clip: rect(38px, 9999px, 122px, 0); }
  30% { clip: rect(69px, 9999px, 54px, 0); }
  35% { clip: rect(98px, 9999px, 71px, 0); }
  40% { clip: rect(146px, 9999px, 34px, 0); }
  45% { clip: rect(134px, 9999px, 43px, 0); }
  50% { clip: rect(102px, 9999px, 80px, 0); }
  55% { clip: rect(119px, 9999px, 44px, 0); }
  60% { clip: rect(106px, 9999px, 99px, 0); }
  65% { clip: rect(141px, 9999px, 74px, 0); }
  70% { clip: rect(20px, 9999px, 78px, 0); }
  75% { clip: rect(133px, 9999px, 79px, 0); }
  80% { clip: rect(78px, 9999px, 52px, 0); }
  85% { clip: rect(35px, 9999px, 39px, 0); }
  90% { clip: rect(67px, 9999px, 70px, 0); }
  95% { clip: rect(71px, 9999px, 103px, 0); }
  100% { clip: rect(83px, 9999px, 40px, 0); }
}

/* ============================================= */
/* NEON GLOW                                     */
/* ============================================= */

.text-neon {
  color: #fff;
  text-shadow:
    0 0 5px #fff,
    0 0 10px #fff,
    0 0 20px #4F46E5,
    0 0 30px #4F46E5,
    0 0 40px #4F46E5;
}

.text-neon-animate {
  animation: neon-pulse 1.5s ease-in-out infinite alternate;
}

@keyframes neon-pulse {
  from {
    text-shadow:
      0 0 5px #fff,
      0 0 10px #fff,
      0 0 20px #4F46E5,
      0 0 30px #4F46E5,
      0 0 40px #4F46E5;
  }
  to {
    text-shadow:
      0 0 2px #fff,
      0 0 5px #fff,
      0 0 10px #4F46E5,
      0 0 20px #4F46E5,
      0 0 30px #4F46E5;
  }
}

/* ============================================= */
/* WAVE ANIMATION                                */
/* ============================================= */

.text-wave span {
  display: inline-block;
  animation: wave 1s ease-in-out infinite;
}

@keyframes wave {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* ============================================= */
/* BOUNCE LETTERS                                */
/* ============================================= */

.text-bounce span {
  display: inline-block;
  animation: bounce-letter 0.5s ease;
}

@keyframes bounce-letter {
  0% { transform: translateY(-100%); opacity: 0; }
  50% { transform: translateY(10%); }
  100% { transform: translateY(0); opacity: 1; }
}

/* ============================================= */
/* BLUR IN                                       */
/* ============================================= */

.text-blur-in {
  animation: blur-in 0.8s ease forwards;
}

@keyframes blur-in {
  from {
    filter: blur(10px);
    opacity: 0;
  }
  to {
    filter: blur(0);
    opacity: 1;
  }
}

/* ============================================= */
/* HIGHLIGHT / MARKER                            */
/* ============================================= */

.text-highlight {
  position: relative;
  display: inline;
}

.text-highlight::after {
  content: '';
  position: absolute;
  left: 0;
  bottom: 0;
  width: 100%;
  height: 40%;
  background: rgba(79, 70, 229, 0.3);
  z-index: -1;
  transform: scaleX(0);
  transform-origin: left;
  animation: highlight-draw 0.6s ease forwards;
}

@keyframes highlight-draw {
  to { transform: scaleX(1); }
}

/* ============================================= */
/* SCRAMBLE / DECODE                             */
/* ============================================= */

.text-scramble {
  font-family: monospace;
}

/* ============================================= */
/* SPLIT LINES                                   */
/* ============================================= */

.text-split-lines > span {
  display: block;
  overflow: hidden;
}

.text-split-lines > span > span {
  display: block;
  transform: translateY(100%);
  animation: line-reveal 0.6s ease forwards;
}

@keyframes line-reveal {
  to { transform: translateY(0); }
}

/* ============================================= */
/* WORD ROTATION                                 */
/* ============================================= */

.text-rotate-container {
  display: inline-block;
  position: relative;
  vertical-align: top;
}

.text-rotate-words {
  display: inline-block;
  position: relative;
}

.text-rotate-words span {
  position: absolute;
  left: 0;
  opacity: 0;
  animation: word-rotate 8s infinite;
}

.text-rotate-words span:nth-child(1) { animation-delay: 0s; }
.text-rotate-words span:nth-child(2) { animation-delay: 2s; }
.text-rotate-words span:nth-child(3) { animation-delay: 4s; }
.text-rotate-words span:nth-child(4) { animation-delay: 6s; }

@keyframes word-rotate {
  0%, 20% { opacity: 1; transform: translateY(0); }
  25%, 100% { opacity: 0; transform: translateY(-20px); }
}
</style>

<!-- ============================================= -->
<!-- EXAMPLES                                      -->
<!-- ============================================= -->

<!-- Typewriter -->
<div style="font-size: 1.5rem; padding: 2rem;">
  <div class="typewriter-container">
    <span class="typewriter">Welcome to our website...</span>
  </div>
</div>

<!-- Gradient text -->
<h1 class="text-gradient" style="font-size: 3rem; font-weight: 800;">
  Gradient Text
</h1>

<h1 class="text-gradient-animate" style="font-size: 3rem; font-weight: 800;">
  Animated Gradient
</h1>

<!-- Text reveal -->
<div class="text-reveal" style="font-size: 2rem; font-weight: 700; overflow: hidden;">
  <span>Text Reveal Animation</span>
</div>

<!-- Glitch effect -->
<h1 class="text-glitch" data-text="GLITCH" style="font-size: 3rem; font-weight: 800; background: #111; color: #fff; padding: 1rem; display: inline-block;">

</h1>

<!-- Neon text -->
<div style="background: #111; padding: 2rem;">

  </h1>
</div>

  Wave Text
</div>

<!-- Blur in -->

</h2>

<!-- Highlight -->
<p style="font-size: 1.25rem;">
  This is <span class="text-highlight">highlighted text</span> with animation.
</p>

<!-- Word rotation -->
<p style="font-size: 1.5rem;">
  We are
  <span class="text-rotate-container">
    <span class="text-rotate-words">
      <span>creative</span>
      <span>innovative</span>
      <span>passionate</span>
      <span>dedicated</span>
    </span>
  </span>
</p>

<script>
// =============================================
// SPLIT TEXT INTO LETTERS
// =============================================

function splitIntoLetters(element, animationClass) {
  const text = element.textContent;
  element.textContent = '';

  text.split('').forEach((char, i) => {
    const span = document.createElement('span');
    span.textContent = char === ' ' ? '\u00A0' : char;
    span.style.animationDelay = `${i * 50}ms`;
    element.appendChild(span);
  });
}

// Apply to wave text
const waveText = document.getElementById('wave-text');
if (waveText) {
  splitIntoLetters(waveText);
}

// =============================================
// TEXT SCRAMBLE EFFECT
// =============================================

class TextScramble {
  constructor(el) {
    this.el = el;
    this.chars = '!<>-_\\/[]{}—=+*^?#________';
    this.update = this.update.bind(this);
  }

  setText(newText) {
    const oldText = this.el.textContent;
    const length = Math.max(oldText.length, newText.length);
    const promise = new Promise(resolve => this.resolve = resolve);
    this.queue = [];

    for (let i = 0; i < length; i++) {
      const from = oldText[i] || '';
      const to = newText[i] || '';
      const start = Math.floor(Math.random() * 40);
      const end = start + Math.floor(Math.random() * 40);
      this.queue.push({ from, to, start, end });
    }

    cancelAnimationFrame(this.frameRequest);
    this.frame = 0;
    this.update();
    return promise;
  }

  update() {
    let output = '';
    let complete = 0;

    for (let i = 0, n = this.queue.length; i < n; i++) {
      let { from, to, start, end, char } = this.queue[i];

      if (this.frame >= end) {
        complete++;
        output += to;
      } else if (this.frame >= start) {
        if (!char || Math.random() < 0.28) {
          char = this.randomChar();
          this.queue[i].char = char;
        }
        output += char;
      } else {
        output += from;
      }
    }

    this.el.textContent = output;

    if (complete === this.queue.length) {
      this.resolve();
    } else {
      this.frameRequest = requestAnimationFrame(this.update);
      this.frame++;
    }
  }

  randomChar() {
    return this.chars[Math.floor(Math.random() * this.chars.length)];
  }
}

// =============================================
// STAGGER LETTER REVEAL
// =============================================

function staggerLetterReveal(element, delayPerLetter = 50) {
  const text = element.textContent;
  element.innerHTML = '';

  text.split('').forEach((char, i) => {
    const span = document.createElement('span');
    span.textContent = char === ' ' ? '\u00A0' : char;
    span.style.opacity = '0';
    span.style.transform = 'translateY(20px)';
    span.style.display = 'inline-block';
    span.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
    span.style.transitionDelay = `${i * delayPerLetter}ms`;
    element.appendChild(span);

    // Trigger animation
    requestAnimationFrame(() => {
      span.style.opacity = '1';
      span.style.transform = 'translateY(0)';
    });
  });
}
</script>

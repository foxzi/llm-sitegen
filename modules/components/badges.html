<!-- Badge Components -->
<!-- Standalone CSS - copy styles and HTML as needed -->

<style>
/* ============================================= */
/* BASE BADGE                                    */
/* ============================================= */

.badge {
  display: inline-flex;
  align-items: center;
  gap: 0.25rem;
  padding: 0.25rem 0.625rem;
  font-size: 0.75rem;
  font-weight: 500;
  line-height: 1;
  border-radius: 9999px;
  white-space: nowrap;
}

.badge svg {
  width: 12px;
  height: 12px;
}

/* ============================================= */
/* COLOR VARIANTS                                */
/* ============================================= */

/* Default / Gray */
.badge-default {
  background: #F3F4F6;
  color: #374151;
}

/* Primary */
.badge-primary {
  background: #EEF2FF;
  color: #4F46E5;
}

/* Success / Green */
.badge-success {
  background: #ECFDF5;
  color: #059669;
}

/* Warning / Yellow */
.badge-warning {
  background: #FFFBEB;
  color: #D97706;
}

/* Error / Red */
.badge-error {
  background: #FEF2F2;
  color: #DC2626;
}

/* Info / Blue */
.badge-info {
  background: #EFF6FF;
  color: #2563EB;
}

/* Purple */
.badge-purple {
  background: #F5F3FF;
  color: #7C3AED;
}

/* Pink */
.badge-pink {
  background: #FDF2F8;
  color: #DB2777;
}

/* ============================================= */
/* SOLID VARIANTS                                */
/* ============================================= */

.badge-solid.badge-default {
  background: #6B7280;
  color: white;
}

.badge-solid.badge-primary {
  background: #4F46E5;
  color: white;
}

.badge-solid.badge-success {
  background: #10B981;
  color: white;
}

.badge-solid.badge-warning {
  background: #F59E0B;
  color: white;
}

.badge-solid.badge-error {
  background: #EF4444;
  color: white;
}

.badge-solid.badge-info {
  background: #3B82F6;
  color: white;
}

/* ============================================= */
/* OUTLINE VARIANTS                              */
/* ============================================= */

.badge-outline {
  background: transparent;
  border: 1px solid currentColor;
}

.badge-outline.badge-default {
  color: #6B7280;
}

.badge-outline.badge-primary {
  color: #4F46E5;
}

.badge-outline.badge-success {
  color: #059669;
}

.badge-outline.badge-warning {
  color: #D97706;
}

.badge-outline.badge-error {
  color: #DC2626;
}

/* ============================================= */
/* SIZES                                         */
/* ============================================= */

.badge-sm {
  padding: 0.125rem 0.375rem;
  font-size: 0.625rem;
}

.badge-lg {
  padding: 0.375rem 0.875rem;
  font-size: 0.8125rem;
}

/* ============================================= */
/* SHAPES                                        */
/* ============================================= */

/* Square badges (for tags) */
.badge-square {
  border-radius: 4px;
}

/* Dot badge (status indicator) */
.badge-dot {
  padding-left: 0.5rem;
}

.badge-dot::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
}

/* ============================================= */
/* WITH REMOVE BUTTON                            */
/* ============================================= */

.badge-removable {
  padding-right: 0.25rem;
}

.badge-remove {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 16px;
  height: 16px;
  margin-left: 0.125rem;
  background: rgba(0, 0, 0, 0.1);
  border: none;
  border-radius: 50%;
  cursor: pointer;
  transition: background 0.2s;
}

.badge-remove:hover {
  background: rgba(0, 0, 0, 0.2);
}

.badge-remove svg {
  width: 10px;
  height: 10px;
}

/* ============================================= */
/* COUNTER / NUMBER BADGE                        */
/* ============================================= */

.badge-count {
  min-width: 20px;
  height: 20px;
  padding: 0 6px;
  border-radius: 10px;
  text-align: center;
}

.badge-count.badge-sm {
  min-width: 16px;
  height: 16px;
  padding: 0 4px;
  font-size: 0.625rem;
}

.badge-count.badge-lg {
  min-width: 24px;
  height: 24px;
  padding: 0 8px;
}

/* ============================================= */
/* AVATAR BADGE (notification dot)               */
/* ============================================= */

.avatar-badge {
  position: relative;
  display: inline-block;
}

.avatar-badge .badge-indicator {
  position: absolute;
  top: 0;
  right: 0;
  width: 12px;
  height: 12px;
  background: #EF4444;
  border: 2px solid white;
  border-radius: 50%;
}

.avatar-badge .badge-indicator.online {
  background: #10B981;
}

.avatar-badge .badge-indicator.offline {
  background: #6B7280;
}

.avatar-badge .badge-indicator.busy {
  background: #F59E0B;
}

/* With count */
.avatar-badge .badge-notification {
  position: absolute;
  top: -4px;
  right: -4px;
  min-width: 18px;
  height: 18px;
  padding: 0 5px;
  background: #EF4444;
  color: white;
  font-size: 0.625rem;
  font-weight: 600;
  border-radius: 9px;
  border: 2px solid white;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ============================================= */
/* STATUS BADGES                                 */
/* ============================================= */

.status {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.8125rem;
  font-weight: 500;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.status-active .status-dot { background: #10B981; }
.status-inactive .status-dot { background: #6B7280; }
.status-pending .status-dot { background: #F59E0B; }
.status-error .status-dot { background: #EF4444; }

/* Pulsing status */
.status-dot.pulse {
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
  70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
  100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
}

/* ============================================= */
/* TAG INPUT                                     */
/* ============================================= */

.tag-input {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  padding: 0.5rem;
  border: 1px solid #D1D5DB;
  border-radius: 8px;
  background: white;
}

.tag-input:focus-within {
  border-color: #4F46E5;
  box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
}

.tag-input .badge {
  margin: 0;
}

.tag-input input {
  flex: 1;
  min-width: 120px;
  border: none;
  outline: none;
  padding: 0.25rem;
  font-size: 0.9375rem;
}
</style>

<!-- ============================================= -->
<!-- EXAMPLES                                      -->
<!-- ============================================= -->

<!-- Basic Badges -->
<span class="badge badge-default">Default</span>
<span class="badge badge-primary">Primary</span>
<span class="badge badge-success">Success</span>
<span class="badge badge-warning">Warning</span>
<span class="badge badge-error">Error</span>

<span class="badge badge-pink">Pink</span>

<!-- Solid Badges -->
<span class="badge badge-solid badge-primary">Solid</span>
<span class="badge badge-solid badge-success">Solid</span>
<span class="badge badge-solid badge-error">Solid</span>

<!-- Outline Badges -->
<span class="badge badge-outline badge-primary">Outline</span>
<span class="badge badge-outline badge-success">Outline</span>
<span class="badge badge-outline badge-error">Outline</span>

<!-- Sizes -->
<span class="badge badge-primary badge-sm">Small</span>
<span class="badge badge-primary">Default</span>
<span class="badge badge-primary badge-lg">Large</span>

<!-- Square Badges (Tags) -->
<span class="badge badge-primary badge-square">React</span>
<span class="badge badge-success badge-square">TypeScript</span>
<span class="badge badge-purple badge-square">Node.js</span>

<!-- With Icon -->
<span class="badge badge-success">

<!-- Dot Badge -->
<span class="badge badge-success badge-dot">Active</span>

<!-- Counter Badges -->
<span class="badge badge-solid badge-error badge-count">5</span>

</span>

<!-- Tag Input -->

<script>
// Remove badge on click
document.querySelectorAll('.badge-remove').forEach(btn => {
  btn.addEventListener('click', () => {
    btn.closest('.badge').remove();
  });
});
</script>

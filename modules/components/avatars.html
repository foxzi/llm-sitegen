<style>
/* ============================================= */
/* BASE AVATAR                                   */
/* ============================================= */

.avatar {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  overflow: hidden;
  background: #E5E7EB;
  color: #6B7280;
  font-weight: 600;
  font-size: 0.875rem;
  flex-shrink: 0;
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ============================================= */
/* SIZES                                         */
/* ============================================= */

.avatar-xs {
  width: 24px;
  height: 24px;
  font-size: 0.625rem;
}

.avatar-sm {
  width: 32px;
  height: 32px;
  font-size: 0.75rem;
}

.avatar-md {
  width: 40px;
  height: 40px;
  font-size: 0.875rem;
}

.avatar-lg {
  width: 56px;
  height: 56px;
  font-size: 1.125rem;
}

.avatar-xl {
  width: 80px;
  height: 80px;
  font-size: 1.5rem;
}

.avatar-2xl {
  width: 120px;
  height: 120px;
  font-size: 2.25rem;
}

/* ============================================= */
/* SHAPES                                        */
/* ============================================= */

.avatar-square {
  border-radius: 8px;
}

.avatar-rounded {
  border-radius: 12px;
}

/* ============================================= */
/* WITH INITIALS                                 */
/* ============================================= */

.avatar-initials {
  text-transform: uppercase;
}

/* Color variants for initials */
.avatar-primary {
  background: #EEF2FF;
  color: #4F46E5;
}

.avatar-success {
  background: #ECFDF5;
  color: #059669;
}

.avatar-warning {
  background: #FFFBEB;
  color: #D97706;
}

.avatar-error {
  background: #FEF2F2;
  color: #DC2626;
}

.avatar-purple {
  background: #F5F3FF;
  color: #7C3AED;
}

.avatar-pink {
  background: #FDF2F8;
  color: #DB2777;
}

.avatar-teal {
  background: #F0FDFA;
  color: #0D9488;
}

/* ============================================= */
/* WITH STATUS INDICATOR                         */
/* ============================================= */

.avatar-wrapper {
  position: relative;
  display: inline-block;
}

.avatar-status {
  position: absolute;
  bottom: 0;
  right: 0;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  border: 2px solid white;
}

.avatar-status.online {
  background: #10B981;
}

.avatar-status.offline {
  background: #6B7280;
}

.avatar-status.busy {
  background: #EF4444;
}

.avatar-status.away {
  background: #F59E0B;
}

/* Status sizes based on avatar size */
.avatar-wrapper.avatar-sm .avatar-status {
  width: 8px;
  height: 8px;
}

.avatar-wrapper.avatar-lg .avatar-status {
  width: 14px;
  height: 14px;
}

.avatar-wrapper.avatar-xl .avatar-status {
  width: 18px;
  height: 18px;
}

/* ============================================= */
/* WITH BADGE                                    */
/* ============================================= */

.avatar-badge {
  position: absolute;
  top: -4px;
  right: -4px;
  min-width: 18px;
  height: 18px;
  padding: 0 5px;
  background: #EF4444;
  color: white;
  font-size: 0.625rem;
  font-weight: 600;
  border-radius: 9px;
  border: 2px solid white;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ============================================= */
/* AVATAR GROUP                                  */
/* ============================================= */

.avatar-group {
  display: flex;
  flex-direction: row-reverse;
  justify-content: flex-end;
}

.avatar-group .avatar {
  border: 2px solid white;
  margin-left: -12px;
  transition: transform 0.2s;
}

.avatar-group .avatar:last-child {
  margin-left: 0;
}

.avatar-group .avatar:hover {
  transform: translateY(-2px);
  z-index: 1;
}

/* Group count */
.avatar-group .avatar-count {
  background: #F3F4F6;
  color: #374151;
  font-size: 0.75rem;
}

/* Different spacing for different sizes */
.avatar-group.avatar-group-sm .avatar {
  margin-left: -8px;
}

.avatar-group.avatar-group-lg .avatar {
  margin-left: -16px;
}

/* ============================================= */
/* AVATAR WITH TEXT                              */
/* ============================================= */

.avatar-text {
  display: inline-flex;
  align-items: center;
  gap: 0.75rem;
}

.avatar-text .avatar-info {
  display: flex;
  flex-direction: column;
}

.avatar-text .avatar-name {
  font-weight: 600;
  color: #111827;
  line-height: 1.2;
}

.avatar-text .avatar-subtitle {
  font-size: 0.8125rem;
  color: #6B7280;
}

/* ============================================= */
/* PLACEHOLDER / LOADING                         */
/* ============================================= */

.avatar-placeholder {
  background: linear-gradient(90deg, #E5E7EB 25%, #F3F4F6 50%, #E5E7EB 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* Icon placeholder */
.avatar-icon svg {
  width: 50%;
  height: 50%;
  color: #9CA3AF;
}

/* ============================================= */
/* EDITABLE AVATAR                               */
/* ============================================= */

.avatar-editable {
  position: relative;
  cursor: pointer;
}

.avatar-editable::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.4);
  border-radius: inherit;
  opacity: 0;
  transition: opacity 0.2s;
}

.avatar-editable:hover::after {
  opacity: 1;
}

.avatar-editable .avatar-edit-icon {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  z-index: 1;
  opacity: 0;
  transition: opacity 0.2s;
}

.avatar-editable:hover .avatar-edit-icon {
  opacity: 1;
}

.avatar-editable .avatar-edit-icon svg {
  width: 24px;
  height: 24px;
}
</style>

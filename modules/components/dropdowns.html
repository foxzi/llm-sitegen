<!-- Dropdown Components -->
<!-- Standalone CSS + JS - copy styles and HTML as needed -->

<style>
/* ============================================= */
/* DROPDOWN CONTAINER                            */
/* ============================================= */

.dropdown {
  position: relative;
  display: inline-block;
}

/* ============================================= */
/* DROPDOWN TRIGGER                              */
/* ============================================= */

.dropdown-toggle {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  cursor: pointer;
}

.dropdown-toggle svg {
  width: 16px;
  height: 16px;
  transition: transform 0.2s;
}

.dropdown.open .dropdown-toggle svg {
  transform: rotate(180deg);
}

/* ============================================= */
/* DROPDOWN MENU                                 */
/* ============================================= */

.dropdown-menu {
  position: absolute;
  top: 100%;
  left: 0;
  min-width: 200px;
  padding: 0.5rem 0;
  margin-top: 0.5rem;
  background: white;
  border: 1px solid #E5E7EB;
  border-radius: 8px;
  box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
  opacity: 0;
  visibility: hidden;
  transform: translateY(-10px);
  transition: all 0.2s ease;
  z-index: 100;
}

.dropdown.open .dropdown-menu {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
}

/* Right aligned */
.dropdown-menu.right {
  left: auto;
  right: 0;
}

/* ============================================= */
/* DROPDOWN ITEMS                                */
/* ============================================= */

.dropdown-item {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  width: 100%;
  padding: 0.625rem 1rem;
  font-size: 0.9375rem;
  color: #374151;
  background: none;
  border: none;
  text-align: left;
  text-decoration: none;
  cursor: pointer;
  transition: background 0.15s;
}

.dropdown-item:hover {
  background: #F3F4F6;
}

.dropdown-item svg {
  width: 18px;
  height: 18px;
  color: #6B7280;
}

.dropdown-item.active {
  background: #EEF2FF;
  color: #4F46E5;
}

.dropdown-item.active svg {
  color: #4F46E5;
}

.dropdown-item.danger {
  color: #DC2626;
}

.dropdown-item.danger svg {
  color: #DC2626;
}

.dropdown-item:disabled,
.dropdown-item.disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* ============================================= */
/* DROPDOWN DIVIDER                              */
/* ============================================= */

.dropdown-divider {
  height: 1px;
  margin: 0.5rem 0;
  background: #E5E7EB;
}

/* ============================================= */
/* DROPDOWN HEADER                               */
/* ============================================= */

.dropdown-header {
  padding: 0.5rem 1rem;
  font-size: 0.75rem;
  font-weight: 600;
  color: #9CA3AF;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* ============================================= */
/* WITH SUBMENU                                  */
/* ============================================= */

.dropdown-submenu {
  position: relative;
}

.dropdown-submenu > .dropdown-item::after {
  content: '';
  margin-left: auto;
  border: 4px solid transparent;
  border-left-color: currentColor;
}

.dropdown-submenu .dropdown-menu {
  top: 0;
  left: 100%;
  margin-top: 0;
  margin-left: 0.25rem;
}

.dropdown-submenu:hover > .dropdown-menu {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
}

/* ============================================= */
/* SELECT DROPDOWN                               */
/* ============================================= */

.select-dropdown {
  min-width: 180px;
}

.select-dropdown .dropdown-toggle {
  width: 100%;
  padding: 0.625rem 0.875rem;
  background: white;
  border: 1px solid #D1D5DB;
  border-radius: 8px;
  justify-content: space-between;
}

.select-dropdown.open .dropdown-toggle {
  border-color: #4F46E5;
  box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
}

.select-dropdown .dropdown-menu {
  width: 100%;
}

.select-dropdown .dropdown-item .check {
  margin-left: auto;
  opacity: 0;
}

.select-dropdown .dropdown-item.selected .check {
  opacity: 1;
  color: #4F46E5;
}

/* ============================================= */
/* CONTEXT MENU                                  */
/* ============================================= */

.context-menu {
  position: fixed;
  min-width: 180px;
  padding: 0.5rem 0;
  background: white;
  border: 1px solid #E5E7EB;
  border-radius: 8px;
  box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
  z-index: 1000;
  display: none;
}

.context-menu.show {
  display: block;
  animation: fadeIn 0.15s ease;
}

/* ============================================= */
/* MEGA MENU                                     */
/* ============================================= */

.mega-menu {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  padding: 1.5rem;
  margin-top: 0.5rem;
  background: white;
  border: 1px solid #E5E7EB;
  border-radius: 12px;
  box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
  display: none;
}

.mega-menu.show {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 2rem;
}

.mega-menu-section h4 {
  font-size: 0.875rem;
  font-weight: 600;
  color: #111827;
  margin-bottom: 0.75rem;
}

.mega-menu-section a {
  display: block;
  padding: 0.375rem 0;
  color: #6B7280;
  text-decoration: none;
  font-size: 0.9375rem;
  transition: color 0.15s;
}

.mega-menu-section a:hover {
  color: #4F46E5;
}

/* ============================================= */
/* USER DROPDOWN                                 */
/* ============================================= */

.user-dropdown .dropdown-toggle {
  padding: 0.375rem;
  border-radius: 50%;
}

.user-dropdown .dropdown-toggle img {
  width: 36px;
  height: 36px;
  border-radius: 50%;
}

.user-dropdown .dropdown-menu {
  min-width: 240px;
}

.user-dropdown .user-info {
  padding: 0.75rem 1rem;
  border-bottom: 1px solid #E5E7EB;
}

.user-dropdown .user-name {
  font-weight: 600;
  color: #111827;
}

.user-dropdown .user-email {
  font-size: 0.8125rem;
  color: #6B7280;
}
</style>

<script>
function toggleDropdown(button) {
  const dropdown = button.closest('.dropdown');
  const wasOpen = dropdown.classList.contains('open');

  // Close all dropdowns
  document.querySelectorAll('.dropdown.open').forEach(d => d.classList.remove('open'));

  // Toggle this one
  if (!wasOpen) {
    dropdown.classList.add('open');
  }
}

function selectOption(item) {
  const dropdown = item.closest('.dropdown');
  const toggle = dropdown.querySelector('.dropdown-toggle span');

  // Update selection
  dropdown.querySelectorAll('.dropdown-item').forEach(i => i.classList.remove('selected'));
  item.classList.add('selected');

  // Update toggle text
  toggle.textContent = item.textContent.trim();

  // Close dropdown
  dropdown.classList.remove('open');
}

// Close on click outside
document.addEventListener('click', (e) => {
  if (!e.target.closest('.dropdown')) {
    document.querySelectorAll('.dropdown.open').forEach(d => d.classList.remove('open'));
  }
});

// Close on Escape
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.dropdown.open').forEach(d => d.classList.remove('open'));
  }
});
</script>

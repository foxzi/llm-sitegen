<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alpine.js Local Example</title>
    <script defer src="../dist/alpine.min.js"></script>
  </head>
  <body>
    <main x-data="{ open: false }">
      <h1>Alpine local bundle</h1>
      <button @click="open = !open">Toggle</button>
      <p x-show="open">Interactive block via Alpine.js.</p>
    </main>
  </body>
</html>

<!-- Favicon Setup Template -->
<!-- Copy to <head> section -->
<!-- Place favicon files in /favicon/ or root directory -->

<!-- ============================================= -->
<!-- MINIMAL SETUP (Quick start) -->
<!-- ============================================= -->

<!-- Standard favicon (browsers look for this automatically in root) -->
<link rel="icon" href="/favicon.ico" sizes="32x32">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">

<!-- ============================================= -->
<!-- COMPLETE SETUP (Recommended) -->
<!-- ============================================= -->

<!-- ICO format for legacy browsers -->
<link rel="icon" href="/favicon/favicon.ico" sizes="32x32">

<!-- SVG favicon (modern browsers, supports dark mode) -->
<link rel="icon" href="/favicon/favicon.svg" type="image/svg+xml">

<!-- PNG favicons for various sizes -->
<link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="96x96" href="/favicon/favicon-96x96.png">

<!-- Apple Touch Icons -->
<link rel="apple-touch-icon" href="/favicon/apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="152x152" href="/favicon/apple-touch-icon-152x152.png">
<link rel="apple-touch-icon" sizes="120x120" href="/favicon/apple-touch-icon-120x120.png">

<!-- Safari Pinned Tab (SVG, single color) -->
<link rel="mask-icon" href="/favicon/safari-pinned-tab.svg" color="#4F46E5">

<!-- Android Chrome -->
<link rel="icon" type="image/png" sizes="192x192" href="/favicon/android-chrome-192x192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/favicon/android-chrome-512x512.png">

<!-- Web App Manifest -->
<link rel="manifest" href="/favicon/site.webmanifest">

<!-- Windows Tiles -->
<meta name="msapplication-TileColor" content="#4F46E5">
<meta name="msapplication-TileImage" content="/favicon/mstile-144x144.png">
<meta name="msapplication-config" content="/favicon/browserconfig.xml">

<!-- Theme Color (browser UI color) -->
<meta name="theme-color" content="#4F46E5">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#111827">

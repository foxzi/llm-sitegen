<!-- Twitter Card Meta Tags Template -->
<!-- Copy to <head> section after basic meta tags -->

<!-- ============================================= -->
<!-- SUMMARY LARGE IMAGE (Most common) -->
<!-- ============================================= -->

<!-- Large image card - best for articles, blog posts -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Page Title Here (70 chars max)">
<meta name="twitter:description" content="A compelling description of your page content (200 chars max)">
<meta name="twitter:image" content="https://example.com/images/twitter-card.jpg">

<!-- Site's Twitter handle -->
<meta name="twitter:site" content="@yourbrand">

<!-- Author's Twitter handle (optional) -->
<meta name="twitter:creator" content="@authorhandle">

<!-- Image alt text for accessibility -->
<meta name="twitter:image:alt" content="Description of the image">

<!-- ============================================= -->
<!-- SUMMARY CARD (Smaller image) -->
<!-- ============================================= -->

<!-- Smaller card with square thumbnail -->
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Page Title">
<meta name="twitter:description" content="Description">
<meta name="twitter:image" content="https://example.com/thumbnail.jpg">
<meta name="twitter:site" content="@yourbrand">

<!-- ============================================= -->
<!-- APP CARD (Mobile app promotion) -->
<!-- ============================================= -->

<meta name="twitter:card" content="app">
<meta name="twitter:site" content="@yourbrand">
<meta name="twitter:description" content="App description">

<!-- iPhone app -->
<meta name="twitter:app:name:iphone" content="App Name">
<meta name="twitter:app:id:iphone" content="123456789">
<meta name="twitter:app:url:iphone" content="appname://page">

<!-- iPad app -->
<meta name="twitter:app:name:ipad" content="App Name">
<meta name="twitter:app:id:ipad" content="123456789">
<meta name="twitter:app:url:ipad" content="appname://page">

<!-- Android app -->
<meta name="twitter:app:name:googleplay" content="App Name">
<meta name="twitter:app:id:googleplay" content="com.example.app">
<meta name="twitter:app:url:googleplay" content="https://play.google.com/...">

<!-- ============================================= -->
<!-- PLAYER CARD (Video/Audio) -->
<!-- ============================================= -->

<meta name="twitter:card" content="player">
<meta name="twitter:title" content="Video Title">
<meta name="twitter:description" content="Video description">
<meta name="twitter:player" content="https://example.com/player.html">
<meta name="twitter:player:width" content="480">
<meta name="twitter:player:height" content="270">
<meta name="twitter:image" content="https://example.com/video-thumbnail.jpg">
<meta name="twitter:site" content="@yourbrand">

<!-- ============================================= -->
<!-- IMAGE GUIDELINES -->
<!-- ============================================= -->

<!--
SUMMARY_LARGE_IMAGE:
- Minimum: 300x157 pixels
- Recommended: 1200x628 pixels (1.91:1 ratio)
- Maximum: 4096x4096 pixels
- File size: Under 5MB
- Formats: JPG, PNG, GIF, WEBP

SUMMARY:
- Minimum: 144x144 pixels
- Recommended: 600x600 pixels (1:1 ratio)
- File size: Under 5MB

Images are cropped to fit, so keep important content centered
-->

<!-- ============================================= -->
<!-- COMBINING WITH OPEN GRAPH -->
<!-- ============================================= -->

<!--
Twitter will fall back to Open Graph tags if Twitter-specific
tags are not present. You can use both for optimal results:

Priority order:
1. twitter:title > og:title > <title>
2. twitter:description > og:description > meta description
3. twitter:image > og:image
-->

<!-- ============================================= -->
<!-- DOMAIN VERIFICATION (Optional) -->
<!-- ============================================= -->

<!-- Verify domain ownership -->
<meta name="twitter:domain" content="example.com">

<!-- Essential Meta Tags Template -->
<!-- Copy to <head> section and replace placeholder values -->

<!-- Character encoding and viewport -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Page title (50-60 characters recommended) -->
<title>Page Title - Brand Name</title>

<!-- Page description (150-160 characters recommended) -->
<meta name="description" content="A compelling description of your page content that encourages users to click through from search results.">

<!-- Keywords (less important for SEO now, but still used by some engines) -->
<meta name="keywords" content="keyword1, keyword2, keyword3">

<!-- Robots directives -->
<!-- index,follow = default, can omit -->
<!-- noindex = don't show in search -->
<!-- nofollow = don't follow links -->
<meta name="robots" content="index, follow">

<!-- Canonical URL (prevents duplicate content) -->
<link rel="canonical" href="https://example.com/page-url">

<!-- Language and locale -->
<meta http-equiv="content-language" content="en">
<html lang="en">

<!-- Author -->
<meta name="author" content="Author Name">

<!-- Copyright -->
<meta name="copyright" content="Company Name">

<!-- Theme color (mobile browser UI) -->
<meta name="theme-color" content="#4F46E5">

<!-- Mobile app capable (iOS) -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="App Name">

<!-- Format detection (disable auto-linking) -->
<meta name="format-detection" content="telephone=no">

<!-- Referrer policy -->
<meta name="referrer" content="origin-when-cross-origin">

<!-- ============================================= -->
<!-- ALTERNATIVE LANGUAGE VERSIONS (if applicable) -->
<!-- ============================================= -->

<link rel="alternate" hreflang="en" href="https://example.com/page">
<link rel="alternate" hreflang="es" href="https://example.com/es/page">
<link rel="alternate" hreflang="x-default" href="https://example.com/page">

<!-- ============================================= -->
<!-- PAGINATION (if applicable) -->
<!-- ============================================= -->

<link rel="prev" href="https://example.com/page?page=1">
<link rel="next" href="https://example.com/page?page=3">

<!-- ============================================= -->
<!-- PRECONNECT (performance optimization) -->
<!-- ============================================= -->

<!-- Preconnect to external domains you'll use -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdn.example.com">

<!-- DNS prefetch (lighter than preconnect) -->
<link rel="dns-prefetch" href="https://analytics.example.com">

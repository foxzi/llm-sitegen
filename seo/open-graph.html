<!-- Open Graph Meta Tags Template -->
<!-- For Facebook, LinkedIn, Pinterest, and other platforms -->
<!-- Copy to <head> section after basic meta tags -->

<!-- ============================================= -->
<!-- BASIC OPEN GRAPH (Required) -->
<!-- ============================================= -->

<meta property="og:title" content="Page Title Here">
<meta property="og:description" content="A compelling description of your page (2-4 sentences recommended)">
<meta property="og:image" content="https://example.com/images/og-image.jpg">
<meta property="og:url" content="https://example.com/page-url">
<meta property="og:type" content="website">

<!-- ============================================= -->
<!-- RECOMMENDED ADDITIONS -->
<!-- ============================================= -->

<meta property="og:site_name" content="Your Site Name">
<meta property="og:locale" content="en_US">

<!-- Image dimensions (helps platforms render faster) -->
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="Description of the image">
<meta property="og:image:type" content="image/jpeg">

<!-- ============================================= -->
<!-- OG:TYPE OPTIONS -->
<!-- ============================================= -->

<!-- website - Default for most pages -->
<meta property="og:type" content="website">

<!-- article - Blog posts, news -->
<meta property="og:type" content="article">

<!-- product - E-commerce -->
<meta property="og:type" content="product">

<!-- profile - User profiles -->
<meta property="og:type" content="profile">

<!-- video.movie, video.episode, video.tv_show -->
<meta property="og:type" content="video.other">

<!-- music.song, music.album, music.playlist -->
<meta property="og:type" content="music.song">

<!-- ============================================= -->
<!-- ARTICLE TYPE (for blog posts/news) -->
<!-- ============================================= -->

<meta property="og:type" content="article">
<meta property="article:published_time" content="2024-01-15T08:00:00+00:00">
<meta property="article:modified_time" content="2024-01-16T10:30:00+00:00">
<meta property="article:author" content="https://example.com/author/john-doe">
<meta property="article:section" content="Technology">
<meta property="article:tag" content="Web Development">
<meta property="article:tag" content="SEO">

<!-- ============================================= -->
<!-- PRODUCT TYPE (for e-commerce) -->
<!-- ============================================= -->

<meta property="og:type" content="product">
<meta property="product:price:amount" content="29.99">
<meta property="product:price:currency" content="USD">
<meta property="product:availability" content="in stock">
<meta property="product:condition" content="new">
<meta property="product:retailer_item_id" content="SKU123">
<meta property="product:brand" content="Brand Name">

<!-- ============================================= -->
<!-- PROFILE TYPE (for personal pages) -->
<!-- ============================================= -->

<meta property="og:type" content="profile">
<meta property="profile:first_name" content="John">
<meta property="profile:last_name" content="Doe">
<meta property="profile:username" content="johndoe">

<!-- ============================================= -->
<!-- VIDEO TYPE -->
<!-- ============================================= -->

<meta property="og:type" content="video.other">
<meta property="og:video" content="https://example.com/video.mp4">
<meta property="og:video:type" content="video/mp4">
<meta property="og:video:width" content="1280">
<meta property="og:video:height" content="720">

<!-- ============================================= -->
<!-- MULTIPLE IMAGES (Facebook uses first, others may vary) -->
<!-- ============================================= -->

<meta property="og:image" content="https://example.com/image1.jpg">
<meta property="og:image" content="https://example.com/image2.jpg">
<meta property="og:image" content="https://example.com/image3.jpg">

<!-- ============================================= -->
<!-- FACEBOOK SPECIFIC -->
<!-- ============================================= -->

<!-- Facebook App ID (if you have a Facebook app) -->
<meta property="fb:app_id" content="your_app_id">

<!-- Facebook Pages (admin) -->
<meta property="fb:admins" content="facebook_user_id">

<!-- ============================================= -->
<!-- MULTIPLE LOCALES -->
<!-- ============================================= -->

<meta property="og:locale" content="en_US">
<meta property="og:locale:alternate" content="es_ES">
<meta property="og:locale:alternate" content="fr_FR">

<!-- ============================================= -->
<!-- IMAGE GUIDELINES -->
<!-- ============================================= -->

<!--
Recommended size: 1200x630 pixels (1.91:1 ratio)
Minimum size: 600x315 pixels
Maximum file size: 8MB
Formats: JPG, PNG, GIF
Text in image: Keep centered, edges may be cropped
-->

services:
  llm-sitegen:
    build: .
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./projects:/app/llm-sitegen/projects
      - ./.llm-imager.yaml:/app/.llm-imager.yaml:ro
      - opencode-data:/app/.local
      - opencode-config:/app/.config
    environment:
      - OPENCODE_HOST=0.0.0.0
      - OPENCODE_PORT=3000

volumes:
  opencode-data:
  opencode-config:

<!-- 404 Error Page -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - 404</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #F9FAFB;
      color: #374151;
      padding: 2rem;
      text-align: center;
    }

    .error-code {
      font-size: 10rem;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #4F46E5, #7C3AED);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #111827;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1.125rem;
      color: #6B7280;
      max-width: 400px;
      margin-bottom: 2rem;
    }

    .actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.875rem 1.5rem;
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #4F46E5;
      color: white;
    }

    .btn-primary:hover {
      background: #4338CA;
    }

    .btn-secondary {
      background: white;
      color: #374151;
      border: 2px solid #E5E7EB;
    }

    .btn-secondary:hover {
      border-color: #4F46E5;
      color: #4F46E5;
    }

    .btn svg {
      width: 20px;
      height: 20px;
    }

    .illustration {
      width: 300px;
      height: 200px;
      margin-bottom: 2rem;
    }

    .links {
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid #E5E7EB;
    }

    .links-title {
      font-size: 0.875rem;
      color: #9CA3AF;
      margin-bottom: 1rem;
    }

    .links-list {
      display: flex;
      gap: 2rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .links-list a {
      color: #4F46E5;
      text-decoration: none;
      font-weight: 500;
    }

    .links-list a:hover {
      text-decoration: underline;
    }

    @media (max-width: 640px) {
      .error-code { font-size: 6rem; }
      h1 { font-size: 1.5rem; }
      .actions { flex-direction: column; }
    }
  </style>
</head>
<body>
  <svg class="illustration" viewBox="0 0 300 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="50" y="40" width="200" height="120" rx="8" fill="#E5E7EB"/>
    <rect x="70" y="60" width="160" height="10" rx="2" fill="#D1D5DB"/>
    <rect x="70" y="80" width="120" height="10" rx="2" fill="#D1D5DB"/>
    <rect x="70" y="100" width="140" height="10" rx="2" fill="#D1D5DB"/>
    <circle cx="230" cy="130" r="20" fill="#FEE2E2"/>
    <path d="M223 123l14 14M237 123l-14 14" stroke="#EF4444" stroke-width="3" stroke-linecap="round"/>
  </svg>

  <div class="error-code">404</div>
  <h1>Page not found</h1>
  <p>Sorry, we couldn't find the page you're looking for. It might have been moved or deleted.</p>

  <div class="actions">
    <a href="/" class="btn btn-primary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Go Home
    </a>
    <a href="#" onclick="history.back(); return false;" class="btn btn-secondary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Go Back
    </a>
  </div>

  <div class="links">
    <p class="links-title">Or try these popular pages:</p>
    <div class="links-list">
      <a href="#">Home</a>
      <a href="#">Products</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
      <a href="#">Help Center</a>
    </div>
  </div>
</body>
</html>

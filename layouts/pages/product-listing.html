<!-- E-commerce: Product Listing / Catalog Page -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - Store Name</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; color: #374151; line-height: 1.5; background: #F9FAFB; }

    /* Header */
    .header { background: white; border-bottom: 1px solid #E5E7EB; }
    .header-inner { max-width: 1400px; margin: 0 auto; padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-size: 1.5rem; font-weight: 700; color: #111827; text-decoration: none; }
    .header-nav { display: flex; list-style: none; gap: 2rem; }
    .header-nav a { color: #6B7280; text-decoration: none; font-weight: 500; }
    .header-nav a:hover { color: #111827; }
    .header-actions { display: flex; align-items: center; gap: 1rem; }
    .header-icon { width: 24px; height: 24px; color: #6B7280; cursor: pointer; }
    .cart-badge { position: relative; }
    .cart-count { position: absolute; top: -8px; right: -8px; background: #EF4444; color: white; font-size: 0.75rem; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

    /* Page Layout */
    .page { max-width: 1400px; margin: 0 auto; padding: 2rem 1.5rem; display: grid; grid-template-columns: 260px 1fr; gap: 2rem; }

    /* Sidebar Filters */
    .sidebar { background: white; padding: 1.5rem; border-radius: 12px; height: fit-content; position: sticky; top: 1rem; }
    .filter-title { font-weight: 600; color: #111827; margin-bottom: 1rem; font-size: 1.125rem; }
    .filter-group { margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid #E5E7EB; }
    .filter-group:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .filter-label { font-weight: 500; color: #374151; margin-bottom: 0.75rem; display: block; }
    .filter-options { display: flex; flex-direction: column; gap: 0.5rem; }
    .filter-option { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
    .filter-option input { width: 18px; height: 18px; accent-color: #4F46E5; }
    .price-range { display: flex; gap: 0.5rem; align-items: center; }
    .price-input { width: 80px; padding: 0.5rem; border: 1px solid #D1D5DB; border-radius: 6px; }
    .btn-filter { width: 100%; padding: 0.75rem; background: #111827; color: white; border: none; border-radius: 8px; font-weight: 500; cursor: pointer; margin-top: 1rem; }

    /* Products */
    .products-section {}
    .products-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .products-count { color: #6B7280; }
    .products-sort select { padding: 0.5rem 1rem; border: 1px solid #D1D5DB; border-radius: 8px; background: white; }
    .products-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }

    /* Product Card */
    .product-card { background: white; border-radius: 12px; overflow: hidden; transition: box-shadow 0.2s; }
    .product-card:hover { box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    .product-image { height: 280px; background: #E5E7EB; position: relative; display: flex; align-items: center; justify-content: center; color: #9CA3AF; }
    .product-badge { position: absolute; top: 1rem; left: 1rem; background: #EF4444; color: white; padding: 0.25rem 0.75rem; border-radius: 6px; font-size: 0.75rem; font-weight: 600; }
    .product-wishlist { position: absolute; top: 1rem; right: 1rem; width: 36px; height: 36px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .product-wishlist svg { width: 20px; height: 20px; color: #9CA3AF; }
    .product-wishlist:hover svg { color: #EF4444; }
    .product-content { padding: 1.25rem; }
    .product-category { font-size: 0.75rem; color: #6B7280; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.25rem; }
    .product-name { font-weight: 600; color: #111827; margin-bottom: 0.5rem; }
    .product-name a { text-decoration: none; color: inherit; }
    .product-rating { display: flex; align-items: center; gap: 0.25rem; margin-bottom: 0.75rem; }
    .product-rating svg { width: 16px; height: 16px; fill: #FBBF24; }
    .product-rating span { font-size: 0.875rem; color: #6B7280; margin-left: 0.25rem; }
    .product-price { display: flex; align-items: center; gap: 0.5rem; }
    .price-current { font-size: 1.25rem; font-weight: 700; color: #111827; }
    .price-old { font-size: 0.9375rem; color: #9CA3AF; text-decoration: line-through; }
    .btn-cart { width: 100%; margin-top: 1rem; padding: 0.75rem; background: #4F46E5; color: white; border: none; border-radius: 8px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
    .btn-cart:hover { background: #4338CA; }

    /* Pagination */
    .pagination { display: flex; justify-content: center; gap: 0.5rem; margin-top: 2rem; }
    .pagination a { padding: 0.5rem 1rem; border: 1px solid #E5E7EB; border-radius: 8px; color: #6B7280; text-decoration: none; }
    .pagination a:hover, .pagination a.active { background: #4F46E5; color: white; border-color: #4F46E5; }

    @media (max-width: 1024px) {
      .page { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .products-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      .products-grid { grid-template-columns: 1fr; }
      .header-nav { display: none; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="/" class="logo">Store</a>
      <ul class="header-nav">
        <li><a href="#">New Arrivals</a></li>
        <li><a href="#">Women</a></li>
        <li><a href="#">Men</a></li>
        <li><a href="#">Accessories</a></li>
        <li><a href="#">Sale</a></li>
      </ul>
      <div class="header-actions">
        <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <div class="cart-badge">
          <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <span class="cart-count">3</span>
        </div>
      </div>
    </div>
  </header>

  <div class="page">
    <aside class="sidebar">
      <h2 class="filter-title">Filters</h2>

      <div class="filter-group">
        <label class="filter-label">Category</label>
        <div class="filter-options">
          <label class="filter-option"><input type="checkbox"> Shirts (24)</label>
          <label class="filter-option"><input type="checkbox"> Pants (18)</label>
          <label class="filter-option"><input type="checkbox"> Dresses (32)</label>
          <label class="filter-option"><input type="checkbox"> Shoes (45)</label>
          <label class="filter-option"><input type="checkbox"> Accessories (67)</label>
        </div>
      </div>

      <div class="filter-group">
        <label class="filter-label">Price Range</label>
        <div class="price-range">
          <input type="number" class="price-input" placeholder="Min">
          <span>—</span>
          <input type="number" class="price-input" placeholder="Max">
        </div>
      </div>

      <div class="filter-group">
        <label class="filter-label">Size</label>
        <div class="filter-options">
          <label class="filter-option"><input type="checkbox"> XS</label>
          <label class="filter-option"><input type="checkbox"> S</label>
          <label class="filter-option"><input type="checkbox"> M</label>
          <label class="filter-option"><input type="checkbox"> L</label>
          <label class="filter-option"><input type="checkbox"> XL</label>
        </div>
      </div>

      <div class="filter-group">
        <label class="filter-label">Color</label>
        <div class="filter-options">
          <label class="filter-option"><input type="checkbox"> Black</label>
          <label class="filter-option"><input type="checkbox"> White</label>
          <label class="filter-option"><input type="checkbox"> Blue</label>
          <label class="filter-option"><input type="checkbox"> Red</label>
        </div>
      </div>

      <button class="btn-filter">Apply Filters</button>
    </aside>

    <main class="products-section">
      <div class="products-header">
        <span class="products-count">Showing 1-12 of 186 products</span>
        <div class="products-sort">
          <select>
            <option>Sort by: Featured</option>
            <option>Price: Low to High</option>
            <option>Price: High to Low</option>
            <option>Newest</option>
            <option>Best Selling</option>
          </select>
        </div>
      </div>

      <div class="products-grid">
        <div class="product-card">
          <div class="product-image">
            <span class="product-badge">Sale</span>
            <div class="product-wishlist"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div>
            Image
          </div>
          <div class="product-content">
            <div class="product-category">Women's Tops</div>
            <h3 class="product-name"><a href="#">Classic Cotton T-Shirt</a></h3>
            <div class="product-rating">
              <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              <span>(128)</span>
            </div>
            <div class="product-price">
              <span class="price-current">$29.99</span>
              <span class="price-old">$49.99</span>
            </div>
            <button class="btn-cart">Add to Cart</button>
          </div>
        </div>

        <div class="product-card">
          <div class="product-image">
            <div class="product-wishlist"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div>
            Image
          </div>
          <div class="product-content">
            <div class="product-category">Men's Pants</div>
            <h3 class="product-name"><a href="#">Slim Fit Chinos</a></h3>
            <div class="product-rating">
              <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              <span>(89)</span>
            </div>
            <div class="product-price">
              <span class="price-current">$59.99</span>
            </div>
            <button class="btn-cart">Add to Cart</button>
          </div>
        </div>

        <div class="product-card">
          <div class="product-image">
            <span class="product-badge">New</span>
            <div class="product-wishlist"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div>
            Image
          </div>
          <div class="product-content">
            <div class="product-category">Accessories</div>
            <h3 class="product-name"><a href="#">Leather Crossbody Bag</a></h3>
            <div class="product-rating">
              <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              <span>(256)</span>
            </div>
            <div class="product-price">
              <span class="price-current">$89.99</span>
            </div>
            <button class="btn-cart">Add to Cart</button>
          </div>
        </div>
      </div>

      <div class="pagination">
        <a href="#">&laquo;</a>
        <a href="#" class="active">1</a>
        <a href="#">2</a>
        <a href="#">3</a>
        <a href="#">4</a>
        <a href="#">&raquo;</a>
      </div>
    </main>
  </div>
</body>
</html>

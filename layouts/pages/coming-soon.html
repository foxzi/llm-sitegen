<!-- Coming Soon / Pre-Launch Page -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon - Product Name</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
      color: white;
      padding: 2rem;
    }

    .container {
      max-width: 600px;
      text-align: center;
    }

    .logo {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 3rem;
      background: linear-gradient(135deg, #60A5FA, #A78BFA);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    h1 {
      font-size: 3.5rem;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 1.5rem;
    }

    .subtitle {
      font-size: 1.25rem;
      color: #94A3B8;
      margin-bottom: 3rem;
      line-height: 1.6;
    }

    /* Countdown */
    .countdown {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-bottom: 3rem;
    }

    .countdown-item {
      text-align: center;
    }

    .countdown-value {
      font-size: 3rem;
      font-weight: 700;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 1rem 1.5rem;
      min-width: 90px;
      display: block;
    }

    .countdown-label {
      font-size: 0.875rem;
      color: #64748B;
      margin-top: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Email Form */
    .email-form {
      display: flex;
      gap: 0.75rem;
      max-width: 450px;
      margin: 0 auto 2rem;
    }

    .email-form input {
      flex: 1;
      padding: 1rem 1.25rem;
      border: 2px solid #334155;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      color: white;
      font-size: 1rem;
    }

    .email-form input::placeholder {
      color: #64748B;
    }

    .email-form input:focus {
      outline: none;
      border-color: #60A5FA;
    }

    .email-form button {
      padding: 1rem 2rem;
      background: linear-gradient(135deg, #3B82F6, #8B5CF6);
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .email-form button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3);
    }

    .privacy-note {
      font-size: 0.875rem;
      color: #64748B;
    }

    /* Social */
    .social {
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid #334155;
    }

    .social-label {
      font-size: 0.875rem;
      color: #64748B;
      margin-bottom: 1rem;
    }

    .social-links {
      display: flex;
      justify-content: center;
      gap: 1rem;
    }

    .social-links a {
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #94A3B8;
      transition: all 0.2s;
    }

    .social-links a:hover {
      background: rgba(255,255,255,0.2);
      color: white;
    }

    .social-links svg {
      width: 20px;
      height: 20px;
    }

    @media (max-width: 640px) {
      h1 { font-size: 2rem; }
      .countdown { gap: 0.75rem; }
      .countdown-value { font-size: 2rem; padding: 0.75rem 1rem; min-width: 70px; }
      .email-form { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Brand</div>

    <h1>Something Awesome is Coming</h1>
    <p class="subtitle">We're working hard to bring you something amazing. Be the first to know when we launch.</p>

    <div class="countdown">
      <div class="countdown-item">
        <span class="countdown-value" id="days">14</span>
        <span class="countdown-label">Days</span>
      </div>
      <div class="countdown-item">
        <span class="countdown-value" id="hours">08</span>
        <span class="countdown-label">Hours</span>
      </div>
      <div class="countdown-item">
        <span class="countdown-value" id="minutes">45</span>
        <span class="countdown-label">Minutes</span>
      </div>
      <div class="countdown-item">
        <span class="countdown-value" id="seconds">30</span>
        <span class="countdown-label">Seconds</span>
      </div>
    </div>

    <form class="email-form">
      <input type="email" placeholder="Enter your email" required>
      <button type="submit">Notify Me</button>
    </form>

    <p class="privacy-note">No spam, we promise. Unsubscribe at any time.</p>

    <div class="social">
      <p class="social-label">Follow us for updates</p>
      <div class="social-links">
        <a href="#" aria-label="Twitter">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"/></svg>
        </a>
        <a href="#" aria-label="Instagram">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><path d="M17.5 6.5h.01"/></svg>
        </a>
        <a href="#" aria-label="LinkedIn">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6zM2 9h4v12H2z"/><circle cx="4" cy="4" r="2"/></svg>
        </a>
      </div>
    </div>
  </div>

  <script>
    // Countdown timer (set your launch date)
    const launchDate = new Date();
    launchDate.setDate(launchDate.getDate() + 14); // 14 days from now

    function updateCountdown() {
      const now = new Date();
      const diff = launchDate - now;

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diff % (1000 * 60)) / 1000);

      document.getElementById('days').textContent = String(days).padStart(2, '0');
      document.getElementById('hours').textContent = String(hours).padStart(2, '0');
      document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
      document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>

<!-- Login / Sign In Page -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - App Name</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      background: #F9FAFB;
    }

    /* Left side - Form */
    .form-side {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .form-container {
      width: 100%;
      max-width: 400px;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: #4F46E5;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #111827;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: #6B7280;
      margin-bottom: 2rem;
    }

    .subtitle a {
      color: #4F46E5;
      text-decoration: none;
    }

    /* Social Login */
    .social-login {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .social-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem;
      border: 1px solid #E5E7EB;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      font-weight: 500;
      color: #374151;
      transition: all 0.2s;
    }

    .social-btn:hover {
      border-color: #4F46E5;
    }

    .social-btn svg {
      width: 20px;
      height: 20px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      color: #9CA3AF;
      font-size: 0.875rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #E5E7EB;
    }

    /* Form */
    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: #374151;
      margin-bottom: 0.5rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid #D1D5DB;
      border-radius: 8px;
      font-size: 1rem;
      transition: all 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #4F46E5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    .form-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      color: #374151;
    }

    .remember input {
      width: 16px;
      height: 16px;
      accent-color: #4F46E5;
    }

    .forgot {
      font-size: 0.875rem;
      color: #4F46E5;
      text-decoration: none;
    }

    .forgot:hover {
      text-decoration: underline;
    }

    .btn-submit {
      width: 100%;
      padding: 0.875rem;
      background: #4F46E5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-submit:hover {
      background: #4338CA;
    }

    /* Right side - Image */
    .image-side {
      flex: 1;
      background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem;
      color: white;
    }

    .image-content {
      max-width: 400px;
      text-align: center;
    }

    .image-placeholder {
      width: 300px;
      height: 200px;
      background: rgba(255,255,255,0.1);
      border-radius: 16px;
      margin: 0 auto 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.5);
    }

    .image-content h2 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }

    .image-content p {
      opacity: 0.8;
    }

    @media (max-width: 1024px) {
      .image-side { display: none; }
    }

    @media (max-width: 640px) {
      .social-login { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="form-side">
    <div class="form-container">
      <div class="logo">Brand</div>

      <h1>Welcome back</h1>
      <p class="subtitle">Don't have an account? <a href="#">Sign up</a></p>

      <div class="social-login">
        <button class="social-btn">
          <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Google
        </button>
        <button class="social-btn">
          <svg viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
          Facebook
        </button>
      </div>

      <div class="divider">or continue with email</div>

      <form>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>

        <div class="form-row">
          <label class="remember">
            <input type="checkbox"> Remember me
          </label>
          <a href="#" class="forgot">Forgot password?</a>
        </div>

        <button type="submit" class="btn-submit">Sign In</button>
      </form>
    </div>
  </div>

  <div class="image-side">
    <div class="image-content">
      <div class="image-placeholder">Illustration</div>
      <h2>Start your journey with us</h2>
      <p>Discover amazing features and grow your business with our powerful platform.</p>
    </div>
  </div>
</body>
</html>
